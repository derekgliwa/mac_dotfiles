[settings]
experimental = true

[tools]
"core:node"   = "lts"
"core:python" = "3.12"
"core:go"     = "latest"

"aqua:cli/cli"                  = "latest" # gh
"npm:@anthropic-ai/claude-code" = "latest"
"cargo:uv"                      = "latest"
